name: Publish Package to npmjs
on:
  push:
    branches:
      - main
    paths:
      - "package.json"
      - "package-lock.json"
      - src/**
      - .github/workflows/publish.yml

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build
      - run: npm publish
